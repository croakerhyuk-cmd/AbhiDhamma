- id: bhumi
  name: { kor: 탄생지, pli: bhūmi, en: birthplace }
  description: { kor: 마음은 법체로 하나이지만 주로 일어나느 곳인 탄생지에 따라 4가지로 나눕니다. }
  groups:
    - { 
        name: { kor: 욕계 마음, pli: kāma-citta, en: sense-sphere }
      }

    - { 
        name: { kor: 색계 마음, pli: rūpa-citta, en: fine-material }
      }

    - { 
        name: { kor: 무색계 마음, pli: arūpa-citta, en: immaterial }
      }

    - { 
        name: { kor: 출세간 마음, pli: lokuttara-citta, en: supramundane }
      }

- id: feeling
  name: { kor: 느낌, pli: vedanā, en: Feeling }
  description: { kor: 마음에 동반되는 느낌의 결을 비교합니다. }
  groups:
    - { name: { kor: 기쁨, pli: somanassa, en: joy } }
    - { name: { kor: 평온, pli: upekkhā, en: equanimity } }
    - { name: { kor: 불쾌, pli: domanassa, en: aversion } }
    - { name: { kor: 즐거운 감각, pli: sukha, en: pleasure } }
    - { name: { kor: 괴로운 감각, pli: dukkha, en: pain } }

- id: root
  name: { kor: 뿌리, pli: hetu, en: Roots }
  description: { kor: 탐욕·성냄·어리석음 또는 아름다운 뿌리와의 관계입니다. }
  groups:
    - { name: { kor: 탐욕, pli: lobha, en: greed } }
    - { name: { kor: 성냄, pli: dosa, en: hatred } }
    - { name: { kor: 어리석음, pli: moha, en: delusion } }
    - { name: { kor: 탐욕 없음, pli: alobha, en: non-greed } }
    - { name: { kor: 뿌리 없음, pli: ahetuka, en: neutral } }

- id: prompt
  name: { kor: 일어나는 방식, pli: saṅkhāra, en: Prompting }
  description: { kor: 자발적으로 일어나는지, 유도되어 일어나는지를 살펴봅니다. }
  groups:
    - { name: { kor: 자발적, pli: asaṅkhārika, en: spontaneous } }
    - { name: { kor: 유도됨, pli: sasaṅkhārika, en: prompted } }
